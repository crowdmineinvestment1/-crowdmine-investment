<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Crowdmine Investment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <section class="auth-section">
        <div class="container">
            <div class="auth-box">
                <div class="auth-header">
                    <i class="fas fa-user-shield" style="color: #dc3545;"></i>
                    <h2 style="color: #dc3545;">ADMIN ACCESS</h2>
                    <p>Enter admin credentials</p>
                </div>
<div class="logo">
    <div class="logo-icon">
        <i class="fas fa-coins"></i>
        <i class="fas fa-chart-line"></i>
    </div>
    <div class="logo-text">
        <span class="logo-title">CROWDMINE</span>
        <span class="logo-subtitle">INVESTMENT</span>
    </div>
</div>
                <form id="adminLoginForm" class="auth-form">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Admin Username</label>
                        <input type="text" id="adminUser" placeholder="admin" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Admin Password</label>
                        <input type="password" id="adminPass" placeholder="Enter password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-sign-in-alt"></i> Login as Admin
                    </button>
                </form>

                <div class="auth-footer">
                    <p><a href="index.html">Back to Website</a></p>
                </div>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('adminUser').value;
            const password = document.getElementById('adminPass').value;
            
            // CHANGE THESE CREDENTIALS!
            const ADMIN_USER = 'admin';
            const ADMIN_PASS = 'admin123'; // ⚠️ CHANGE THIS!
            
            if (username === ADMIN_USER && password === ADMIN_PASS) {
                localStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                alert('❌ Invalid admin credentials!');
            }
        });
    </script>
</body>
</html>
